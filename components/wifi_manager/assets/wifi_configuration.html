<!DOCTYPE html>
<html>
<head>
    <title>Network Configuration</title>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="referrer no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style type="text/css">
        /* ========== Base Styles ========== */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        /* ========== Form Elements ========== */
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        input[type="submit"] {
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 3px;
            padding: 10px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
        input[type="submit"]:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #remember_bssid, #sleep_mode {
            width: auto;
        }

        /* ========== AP List Styles ========== */
        #ap_list {
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        #ap_list .scanning {
            font-style: italic;
            color: #666;
        }
        #ap_list a {
            display: block;
            margin-top: 5px;
            color: #007bff;
            text-decoration: none;
        }
        #ap_list a:hover {
            text-decoration: underline;
        }

        /* ========== Tab Styles ========== */
        .tabs {
            display: flex;
            margin-top: 20px;
            margin-bottom: 0;
            padding-left: 20px;
            border-bottom: 1px solid #ccc;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-bottom: none;
            border-radius: 5px 5px 0 0;
            margin-right: 5px;
            background-color: #f0f0f0;
            position: relative;
            top: 1px;
        }
        .tab.active {
            background-color: #fff;
        }
        .tab-content {
            display: none;
            border-top: none;
            padding: 20px;
            background-color: #fff;
        }
        .tab-content.active {
            display: block;
        }

        /* ========== Toast Message Styles ========== */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            min-width: 200px;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
        }

        /* ========== Loading Spinner Styles ========== */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .loading-overlay.show {
            display: flex;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .loading-text {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">Connecting...</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('wifi')">Wi-Fi Config</div>
        <div class="tab" onclick="switchTab('advanced')">Advanced</div>
    </div>

    <!-- Wi-Fi Configuration Tab -->
    <div id="wifi-tab" class="tab-content active">
        <!-- Saved Wi-Fi List -->
        <div id="saved_list_container" style="display: none;">
            <h3>Saved Wi-Fi</h3>
            <ul id="saved_list">
                <li><span>SSID</span></li>
            </ul>
        </div>

        <!-- New Wi-Fi Connection -->
        <div>
            <h3>New Wi-Fi</h3>
            <p class="error" style="color: red; text-align: center;" id="error"></p>
            <form action="/submit" method="post" onsubmit="submitForm(event)">
                <p>
                    <label for="ssid">SSID:</label>
                    <input type="text" id="ssid" name="ssid" required readonly>
                </p>
                <p>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password">
                </p>
                <p style="text-align: center;">
                    <input type="submit" value="Connect" id="button">
                </p>
            </form>
            <p id="ap_list"></p>
        </div>
    </div>

    <!-- Advanced Configuration Tab -->
    <div id="advanced-tab" class="tab-content">
        <form action="/advanced/submit" method="post" onsubmit="submitAdvancedForm(event)">
            <div>
                <h3>Advanced</h3>
                <p class="error" style="color: red; text-align: center;" id="advanced_error"></p>

                <!-- OTA URL -->
                <p>
                    <label for="ota_url">Custom OTA URL:</label>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="text" id="ota_url" name="ota_url" style="flex: 1;">
                        <button type="button" onclick="clearOtaUrl()" style="padding: 5px 10px; border: 1px solid #ccc; border-radius: 3px; background-color: #f0f0f0; cursor: pointer;">❌</button>
                    </div>
                </p>

                <!-- Max TX Power -->
                <p style="display: flex; align-items: center; gap: 10px;">
                    <label for="max_tx_power" style="white-space: nowrap;">Wi-Fi Max TX Power:</label>
                    <select id="max_tx_power" name="max_tx_power">
                        <option value="8">2 dBm</option>
                        <option value="20">5 dBm</option>
                        <option value="28">7 dBm</option>
                        <option value="34">8 dBm</option>
                        <option value="44">11 dBm</option>
                        <option value="52">13 dBm</option>
                        <option value="56">14 dBm</option>
                        <option value="60">15 dBm</option>
                        <option value="66">16 dBm</option>
                        <option value="72">18 dBm</option>
                        <option value="80">20 dBm</option>
                    </select>
                </p>

                <!-- Remember BSSID -->
                <p style="display: flex; align-items: center; gap: 10px;">
                    <label for="remember_bssid" style="margin: 0;">
                        <span>Remember BSSID when connecting to Wi-Fi</span>
                    </label>
                    <input type="checkbox" id="remember_bssid" name="remember_bssid">
                </p>

                <!-- Sleep Mode -->
                <p style="display: flex; align-items: center; gap: 10px;">
                    <label for="sleep_mode" style="margin: 0;">
                        <span>Enable Sleep Mode</span>
                    </label>
                    <input type="checkbox" id="sleep_mode" name="sleep_mode">
                </p>

                <p style="text-align: center;">
                    <input type="submit" value="Save" id="advanced_button">
                </p>
            </div>
        </form>
    </div>

    <script type="text/javascript">
        // ========== Global Variables ==========
        const button = document.getElementById('button');
        const error = document.getElementById('error');
        const ssid = document.getElementById('ssid');
        let support5G = false; // Store 5G support status

        // ========== Wi-Fi List Management ==========

        /**
         * Render saved Wi-Fi list
         */
        function renderSavedList(data) {
            const savedListContainer = document.getElementById('saved_list_container');
            const savedList = document.getElementById('saved_list');
            savedList.innerHTML = '';

            data.forEach((ssid, index) => {
                const li = document.createElement('li');
                let html = `<span>${ssid}</span>`;

                // Only add priority and delete buttons after the first item
                if (index > 0) {
                    html += ` <span>
                        <button type="button" onclick="setDefaultItem(this, ${index})">⬆️</button>
                        <button type="button" onclick="deleteItem(this, ${index})">❌</button>
                    </span>`;
                } else {
                    html += ` <span><button type="button" onclick="deleteItem(this, ${index})">❌</button></span>`;
                }

                li.innerHTML = html;
                savedList.appendChild(li);
            });

            // Show/hide container based on whether there are saved networks
            savedListContainer.style.display = data.length > 0 ? 'block' : 'none';
        }

        /**
         * Delete saved Wi-Fi network
         */
        function deleteItem(item, index) {
            item.disabled = true;
            fetch('/saved/delete?index=' + index)
                .then(response => response.json())
                .then(() => {
                    loadSavedList();
                });
        }

        /**
         * Set default Wi-Fi network (move to top)
         */
        function setDefaultItem(item, index) {
            item.disabled = true;
            fetch('/saved/set_default?index=' + index)
                .then(response => response.json())
                .then(() => {
                    loadSavedList();
                });
        }

        /**
         * Load saved Wi-Fi list from server
         */
        function loadSavedList() {
            fetch('/saved/list')
                .then(response => response.json())
                .then(data => {
                    renderSavedList(data);
                });
        }

        /**
         * Load available Wi-Fi networks
         */
        function loadAPList() {
            if (button.disabled) {
                return;
            }

            const apList = document.getElementById('ap_list');

            // Check if AP list already has content
            const hasExistingAPs = apList.querySelector('a') !== null;

            // Only show scanning text if there's no existing AP list
            if (!hasExistingAPs) {
                apList.innerHTML = '<p class="scanning">Scanning...</p>';
            }

            fetch('/scan')
                .then(response => response.json())
                .then(data => {
                    // Update global 5G support status
                    support5G = !!data.support_5g;

                    // Use 5G text if supported, otherwise 2.4G
                    const selectText = support5G
                        ? 'Select a Wi-Fi from the list below:'
                        : 'Select a 2.4G Wi-Fi from the list below:';

                    apList.innerHTML = '<p>' + selectText + '</p>';

                    // Iterate through available APs
                    data.aps.forEach(ap => {
                        const link = document.createElement('a');
                        link.href = '#';
                        link.textContent = ap.ssid + ' (' + ap.rssi + ' dBm)';

                        // Add icon for open/secured networks
                        if (ap.authmode === 0) {
                            link.textContent += ' 🌐';
                        } else {
                            link.textContent += ' 🔒';
                        }

                        link.addEventListener('click', () => {
                            ssid.value = ap.ssid;
                        });

                        apList.appendChild(link);
                    });

                    // Refresh AP list every 5 seconds
                    setTimeout(loadAPList, 5000);
                })
                .catch(err => {
                    console.error('Error:', err);
                    // On error, try again after 5 seconds
                    setTimeout(loadAPList, 5000);
                });
        }

        // ========== Form Submission ==========

        /**
         * Submit Wi-Fi connection form
         */
        async function submitForm(event) {
            event.preventDefault();
            button.disabled = true;
            error.textContent = '';

            // Show loading animation
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.classList.add('show');

            const payload = {
                ssid: ssid.value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.error || 'Connection failed');
                }

                // Connection successful, redirect to done page
                button.disabled = false;
                window.location.href = '/done.html';
            } catch (err) {
                // Hide loading animation on error
                loadingOverlay.classList.remove('show');
                error.textContent = err.message;
                button.disabled = false;
            }
        }

        /**
         * Submit advanced configuration form
         */
        async function submitAdvancedForm(event) {
            event.preventDefault();
            const advancedButton = document.getElementById('advanced_button');
            const advancedError = document.getElementById('advanced_error');
            advancedButton.disabled = true;
            advancedError.textContent = '';

            const config = {
                ota_url: document.getElementById('ota_url').value,
                max_tx_power: parseInt(document.getElementById('max_tx_power').value, 10),
                remember_bssid: document.getElementById('remember_bssid').checked,
                sleep_mode: document.getElementById('sleep_mode').checked
            };

            try {
                const response = await fetch('/advanced/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.error || 'Save failed');
                }

                advancedButton.disabled = false;
                showToast('Configuration saved');
            } catch (err) {
                advancedError.textContent = err.message;
                advancedButton.disabled = false;
            }
        }

        // ========== UI Functions ==========

        /**
         * Switch between tabs
         */
        function switchTab(tabName) {
            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // Remove active class from all tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected tab content
            document.getElementById(tabName + '-tab').classList.add('active');

            // Activate selected tab
            document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
        }

        /**
         * Show toast notification
         */
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        /**
         * Load advanced configuration from server
         */
        async function loadAdvancedConfig() {
            try {
                const response = await fetch('/advanced/config');
                const data = await response.json();

                if (data.ota_url) {
                    document.getElementById('ota_url').value = data.ota_url;
                }
                if (data.max_tx_power) {
                    document.getElementById('max_tx_power').value = data.max_tx_power;
                }
                if (data.remember_bssid !== undefined) {
                    document.getElementById('remember_bssid').checked = data.remember_bssid;
                }
                if (data.sleep_mode !== undefined) {
                    document.getElementById('sleep_mode').checked = data.sleep_mode;
                }
            } catch (err) {
                console.error('Error loading advanced config:', err);
            }
        }

        /**
         * Clear OTA URL input field
         */
        function clearOtaUrl() {
            document.getElementById('ota_url').value = '';
        }

        // ========== Initialization ==========

        /**
         * Initialize page on DOM load
         */
        document.addEventListener('DOMContentLoaded', () => {
            loadSavedList();
            loadAPList();
            loadAdvancedConfig();
        });

        /**
         * Handle browser back button
         */
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                loadSavedList();
            }
        });

        /**
         * Enable SSID input (fix iOS bug)
         */
        ssid.addEventListener('touchstart', () => {
            ssid.removeAttribute('readonly');
            ssid.focus();
        }, { once: true });
    </script>
</body>
</html>
